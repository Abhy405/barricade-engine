<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Barricade Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 12px;
    }
    h1 {
      font-size: 16px;
      text-align: center;
      margin-bottom: 8px;
      color: #00d4ff;
    }
    .status {
      font-size: 11px;
      text-align: center;
      margin-bottom: 8px;
      color: #888;
    }
    .status.connected { color: #4caf50; }
    .status.disconnected { color: #f44336; }

    /* Board */
    #board-container {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(17, 1fr);
      grid-template-rows: repeat(17, 1fr);
      width: 340px;
      height: 340px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 4px;
    }
    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 2px;
    }
    .cell.square {
      background: #1a1a3e;
      border: 1px solid #2a2a5e;
    }
    .cell.square:hover { background: #2a2a6e; }
    .cell.square.highlight { background: rgba(0, 212, 255, 0.3); border-color: #00d4ff; }
    .cell.square.best-move { background: rgba(76, 175, 80, 0.4); border-color: #4caf50; }
    .cell.pawn1 { background: #ff6b6b !important; color: #fff; border-color: #ff4444 !important; }
    .cell.pawn2 { background: #4ecdc4 !important; color: #fff; border-color: #2bbbad !important; }
    .cell.wall-slot { background: transparent; cursor: pointer; }
    .cell.wall-slot:hover { background: rgba(255, 200, 0, 0.3); }
    .cell.wall-slot.wall-h { background: #ffc107; border-radius: 1px; }
    .cell.wall-slot.wall-v { background: #ffc107; border-radius: 1px; }
    .cell.wall-slot.best-wall { background: rgba(76, 175, 80, 0.6); }
    .cell.corner { background: transparent; }

    /* Controls */
    .controls {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    button {
      flex: 1;
      min-width: 80px;
      padding: 6px 10px;
      background: #0f3460;
      color: #eee;
      border: 1px solid #00d4ff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
    }
    button:hover { background: #1a4a8a; }
    button:active { background: #00d4ff; color: #000; }
    button.primary { background: #00d4ff; color: #000; }
    button.primary:hover { background: #33dfff; }

    /* Info panel */
    .info {
      background: #16213e;
      border-radius: 4px;
      padding: 8px;
      font-size: 11px;
      margin-bottom: 8px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .info-label { color: #888; }
    .info-value { color: #00d4ff; font-weight: 600; }

    /* Settings */
    .settings {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      margin-bottom: 8px;
    }
    .settings label { color: #888; }
    .settings select, .settings input {
      background: #0f3460;
      color: #eee;
      border: 1px solid #2a2a5e;
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 11px;
    }

    #engine-output {
      background: #0d1117;
      border-radius: 4px;
      padding: 6px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #8b949e;
      max-height: 80px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .mode-toggle {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .mode-toggle button {
      flex: 1;
      font-size: 10px;
      padding: 4px;
    }
    .mode-toggle button.active {
      background: #00d4ff;
      color: #000;
    }
  </style>
</head>
<body>
  <h1>Barricade Engine</h1>
  <div class="status disconnected" id="status">Connecting to engine...</div>

  <div class="mode-toggle">
    <button id="mode-move" class="active" onclick="setMode('move')">Move Pawns</button>
    <button id="mode-wall-h" onclick="setMode('wall-h')">Place H-Wall</button>
    <button id="mode-wall-v" onclick="setMode('wall-v')">Place V-Wall</button>
  </div>

  <div id="board-container">
    <div id="board"></div>
  </div>

  <div class="info">
    <div class="info-row">
      <span class="info-label">Turn:</span>
      <span class="info-value" id="turn-info">Player 1 (Red)</span>
    </div>
    <div class="info-row">
      <span class="info-label">Walls:</span>
      <span class="info-value" id="walls-info">P1: 10 | P2: 10</span>
    </div>
    <div class="info-row">
      <span class="info-label">Shortest Path:</span>
      <span class="info-value" id="path-info">P1: 8 | P2: 8</span>
    </div>
    <div class="info-row">
      <span class="info-label">Engine Eval:</span>
      <span class="info-value" id="eval-info">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Best Move:</span>
      <span class="info-value" id="best-move-info">—</span>
    </div>
  </div>

  <div class="settings">
    <label>Depth:</label>
    <select id="depth">
      <option value="2">2 (fast)</option>
      <option value="3">3</option>
      <option value="4" selected>4</option>
      <option value="5">5</option>
      <option value="6">6 (slow)</option>
    </select>
    <label>Time:</label>
    <select id="time-limit">
      <option value="1">1s</option>
      <option value="3" selected>3s</option>
      <option value="5">5s</option>
      <option value="10">10s</option>
    </select>
    <label>You:</label>
    <select id="player-side">
      <option value="0">P1 (Red)</option>
      <option value="1">P2 (Teal)</option>
    </select>
  </div>

  <div class="controls">
    <button class="primary" onclick="getBestMove()">Analyze</button>
    <button onclick="autoPlay()">Auto-Play</button>
    <button onclick="readFromPage()">Read Page</button>
    <button onclick="resetBoard()">Reset</button>
    <button onclick="undoMove()">Undo</button>
  </div>

  <div id="engine-output">Engine ready.</div>

  <script src="popup.js"></script>
</body>
</html>
